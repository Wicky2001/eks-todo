name: Deploy Frontend to EKS

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend-deploy.yml

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
  K8_NAMESPACE: default
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL}" \
            -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy frontend to EKS
        run: |
          kubectl set image deployment/frontend-deployment \
            frontend-container=${{ steps.build-image.outputs.image }} \
            -n "$K8_NAMESPACE"
          kubectl rollout status deployment/frontend-deployment -n "$K8_NAMESPACE"
