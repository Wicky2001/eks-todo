name: Deploy Frontend to EKS

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend-deploy.yaml

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
  K8_NAMESPACE: default
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL}" \
            -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      
      - name: Update Kubernetes deployment manifest with new image
        run: |
          IMAGE_URI=${{ steps.build-image.outputs.image }}
          yq e '.spec.template.spec.containers[0].image = "'"$IMAGE_URI"'"' -i k8s/app/frontend/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add k8s/app/frontend/deployment.yaml

          if git diff --cached --quiet; then
            echo "No deployment manifest changes detected."
            exit 0
          fi
          
          git commit -m "ci: update frontend image tag to ${{ github.sha }}"

          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push deployment manifest update after 3 attempts."
              exit 1
            fi
          done
