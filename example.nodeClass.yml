# -----------------------------
# NODEPOOL
# -----------------------------
# A NodePool is a collection of rules Karpenter uses
# when creating nodes.
#
# This NodePool says:
# "Use the EC2NodeClass named 'default'
# whenever I need to launch a node."
#
apiVersion: karpenter.sh/v1
kind: NodePool

metadata:
  # Name of this NodePool
  name: default

spec:
  template:
    spec:

      # Reference to the EC2NodeClass
      # that contains the AWS-specific settings
      nodeClassRef:

        # API group where EC2NodeClass exists
        group: karpenter.k8s.aws

        # Resource type
        kind: EC2NodeClass

        # Name of the EC2NodeClass to use
        name: default

---
# -----------------------------
# EC2NODECLASS
# -----------------------------
# This is the AWS blueprint for every EC2 instance
# Karpenter launches.
#
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass

metadata:
  # Name referenced by the NodePool above
  name: default

spec:

  # ------------------------------------
  # KUBELET CONFIGURATION
  # ------------------------------------
  #
  # Kubelet = the Kubernetes agent running
  # on every worker node.
  #
  kubelet:

    # Maximum pods allowed per CPU core.
    podsPerCore: 2

    # Absolute maximum number of pods
    # that can run on the node.
    maxPods: 20

    # SYSTEM RESERVED EXPLANATION:
    # This is not mandatory, but highly recommended. This does NOT restrict 
    # the operating system (AMI). Instead, it protects the OS from your pods.
    # It tells Kubernetes: "Hide 100MB of RAM and 0.1 CPU from the pods, and
    # save it exclusively for the background Linux system processes so the node doesn't crash."
    systemReserved:
      cpu: 100m
      memory: 100Mi
      ephemeral-storage: 1Gi

    # Resources reserved for Kubernetes components (kubelet, kube-proxy, etc.)
    kubeReserved:
      cpu: 200m
      memory: 100Mi
      ephemeral-storage: 3Gi

    # ------------------------------------
    # HARD EVICTION RULES (The "Red Light")
    # ------------------------------------
    # Think of this as an immediate emergency brake. If memory or disk drops 
    # below these percentages, Kubernetes skips all timers and instantly 
    # kills pods to keep the node from completely freezing up.
    #
    evictionHard:
      memory.available: 5%
      nodefs.available: 10%
      nodefs.inodesFree: 10%

    # ------------------------------------
    # SOFT EVICTION RULES (The "Yellow Light")
    # ------------------------------------
    # These rules do not trigger at the same time as the Hard rules because they use a timer.
    # Example: If disk space hits 14%, it passes the 15% soft limit. Kubernetes does not 
    # kill pods yet; it starts a countdown clock for 1 minute and 30 seconds. 
    # If the disk space stays bad for that entire time, it gracefully moves pods away. 
    # However, if a pod suddenly floods the disk and it crashes straight to 9%, 
    # the Hard Eviction rule completely takes over and skips this soft timer entirely.
    #
    evictionSoft:
      memory.available: 500Mi
      nodefs.available: 15%
      nodefs.inodesFree: 15%

    # How long the condition must exist before soft eviction begins.
    evictionSoftGracePeriod:
      memory.available: 1m
      nodefs.available: 1m30s
      nodefs.inodesFree: 2m

    # Maximum time Kubernetes allows a pod to shut down gracefully during eviction.
    evictionMaxPodGracePeriod: 60

    # Start deleting unused container images when disk usage exceeds 85%.
    imageGCHighThresholdPercent: 85

    # Stop deleting images once disk usage falls to 80%.
    imageGCLowThresholdPercent: 80

    # Linux CPU quota enforcement.
    cpuCFSQuota: true

    # DNS server IP pods should use.
    clusterDNS:
      - "10.0.1.100"

  # ------------------------------------
  # AMI FAMILY (The Instruction Manual)
  # ------------------------------------
  # This tells Karpenter *how* to talk to the operating system once it boots.
  # It configures things like where system logs go and how to handle startup scripts.
  # You need this AND 'amiSelectorTerms' because an AMI Family (like AL2) has thousands
  # of individual sub-versions and variants across AWS.
  #
  amiFamily: AL2

  # ------------------------------------
  # SUBNET SELECTION
  # ------------------------------------
  # Karpenter does NOT scan your entire global AWS account. It uses the AWS API to 
  # search *only* within the current AWS region your cluster is running in. 
  # It is best practice to tag only your private subnets here so worker nodes 
  # are never exposed directly to the public internet.
  #
  subnetSelectorTerms:
    # Select subnets with BOTH tags:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
        environment: test

    # OR select this subnet directly
    - id: subnet-09fa4a0a8f233a921

  # ------------------------------------
  # SECURITY GROUP SELECTION
  # ------------------------------------
  # Your Terraform code (aws_eks_cluster) automatically creates a main Cluster Security Group 
  # for control plane communication. However, Terraform does not automatically add the 
  # 'karpenter.sh/discovery' tag to it. 
  # To make this work smoothly, you can use an 'aws_ec2_tag' resource in Terraform to inject 
  # this exact discovery tag onto that automatically created security group.
  #
  securityGroupSelectorTerms:
    # Security groups matching both tags
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
        environment: test

    # OR by security group name
    - name: my-security-group

    # OR by exact security group ID
    - id: sg-063d7acfb4b06c82c

  # ------------------------------------
  # IAM ROLE
  # ------------------------------------
  # AWS permissions assigned to EC2 nodes.
  role: "KarpenterNodeRole-${CLUSTER_NAME}"

  # IAM Instance Profile wrapper.
  instanceProfile: "KarpenterNodeInstanceProfile-${CLUSTER_NAME}"

  # ------------------------------------
  # AMI SELECTION (The Download Link)
  # ------------------------------------
  # While 'amiFamily' sets the OS type, this section tells Karpenter the exact, 
  # physical image ID (like ami-123) to pull from AWS to launch the machine.
  #
  amiSelectorTerms:
    # Select AMIs with matching tags
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
        environment: test

    # OR select AMI by name
    - name: my-ami

    # OR by AMI ID
    - id: ami-123

    # OR get AMI ID from AWS Systems Manager Parameter Store
    - ssmParameter: my-custom-parameter

  # ------------------------------------
  # CAPACITY RESERVATIONS
  # ------------------------------------
  # A Capacity Reservation is a feature where you pay AWS upfront to hold/reserve 
  # specific hardware slots (like rare GPU machines) so nobody else can rent them.
  # Setting 'instanceMatchCriteria: open' means Karpenter will automatically look into 
  # your pre-paid pool of reservations and use those slots first before trying to 
  # launch standard public instances.
  #
  capacityReservationSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
    - id: cr-123
    - instanceMatchCriteria: open

  # ------------------------------------
  # PLACEMENT GROUP
  # ------------------------------------
  # Launch instances physically close together for low latency networking.
  placementGroupSelector:
    name: my-pg
    id: pg-123

  # ------------------------------------
  # AWS TAGS
  # ------------------------------------
  # These tags will automatically appear on created EC2 instances, EBS volumes, etc.
  tags:
    team: team-a
    app: team-a-app

  # ------------------------------------
  # EC2 METADATA SERVICE SETTINGS
  # ------------------------------------
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1
    httpTokens: required

  # ------------------------------------
  # ROOT DISK CONFIGURATION
  # ------------------------------------
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 10000
        encrypted: true
        kmsKeyID: "1234abcd-12ab-34cd-56ef-1234567890ab"
        deleteOnTermination: true
        throughput: 125
        snapshotID: snap-0123456789
        volumeInitializationRate: 100

  # ------------------------------------
  # NETWORK INTERFACES (ENIs)
  # ------------------------------------
  networkInterfaces:
    - networkCardIndex: 0
      deviceIndex: 0
      interfaceType: interface
    - networkCardIndex: 0
      deviceIndex: 1
      interfaceType: interface

  # ------------------------------------
  # INSTANCE STORE CONFIGURATION
  # ------------------------------------
  instanceStorePolicy: RAID0

  # ------------------------------------
  # CUSTOM STARTUP SCRIPT
  # ------------------------------------
  userData: |
    echo "Hello world"

  # ------------------------------------
  # CLOUDWATCH MONITORING
  # ------------------------------------
  detailedMonitoring: true

  # ------------------------------------
  # PUBLIC IP
  # ------------------------------------
  associatePublicIPAddress: true