services:
  db:
    image: ghcr.io/documentdb/documentdb/documentdb-local:latest
    container_name: docdb
    command:
      - --username
      - demo
      - --password
      - demo
    ports:
      - '10260:10260'
    volumes:
      - docdb_data:/var/lib/documentdb
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/10260' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend-todo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://demo:demo@db:10260/todos?authSource=admin&tls=true&tlsAllowInvalidCertificates=true&directConnection=true
    env_file:
      - ./backend/.env
    ports:
      - "8081:8081"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NODE_ENV=development
        - VITE_API_URL=http://localhost:8081
    container_name: frontend-todo
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
       
    ports:
      - '8080:8080'

  migrate:
    build:
      context: .
      dockerfile: mongoose/Dockerfile
    container_name: migrate-todo
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://demo:demo@db:10260/todos?authSource=admin&tls=true&tlsAllowInvalidCertificates=true&directConnection=true
    env_file:
      - ./mongoose/.env
    

volumes:
  docdb_data: