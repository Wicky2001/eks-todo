apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: app
spec:
  selector:
    app: backend
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  template:
    spec:
      containers:
        - image: 078238935484.dkr.ecr.ap-south-1.amazonaws.com/eks-todo-backend:80dc76a9198df0b043d25f223da4e170e5bd0b2f
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 078238935484.dkr.ecr.ap-south-1.amazonaws.com/eks-todo-backend:80dc76a9198df0b043d25f223da4e170e5bd0b2f
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config-map
