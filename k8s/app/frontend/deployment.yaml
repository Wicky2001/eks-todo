apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend # label by which pod can be selected
    spec:
      containers:
        - name: frontend-container
          ports:
            - containerPort: 8080
          image: 078238935484.dkr.ecr.ap-south-1.amazonaws.com/eks-todo-frontend:0b831fb0a7ec2339d61c269142a14624cf48025c
          imagePullPolicy: Always
